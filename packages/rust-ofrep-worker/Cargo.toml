[package]
name = "rust-ofrep-worker"
version = "0.1.0"
edition = "2021"
description = "OFREP handler for Cloudflare Workers using flagd evaluation engine"
license = "Apache-2.0"
repository = "https://github.com/open-feature/flagd-ofrep-cf-worker"
keywords = ["openfeature", "ofrep", "flagd", "cloudflare", "wasm"]

[dependencies]
open-feature-flagd = { path = "../../contrib/rust-sdk-contrib/crates/flagd", default-features = false, features = ["wasm"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

[dev-dependencies]
