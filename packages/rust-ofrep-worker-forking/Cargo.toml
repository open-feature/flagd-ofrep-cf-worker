[package]
name = "rust-ofrep-worker-forking"
version = "0.1.0"
edition = "2021"
description = "OFREP handler using forking-flagd-evaluator for Cloudflare Workers"
license = "Apache-2.0"
repository = "https://github.com/open-feature/flagd-ofrep-cf-worker"
keywords = ["openfeature", "ofrep", "flagd", "cloudflare", "wasm"]

[dependencies]
# Use the forked flagd-evaluator with js-time feature for Cloudflare Workers
flagd-evaluator = { path = "../../contrib/flagd-evaluator", features = ["js-time"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
